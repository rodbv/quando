name: Publish to PyPI

# Triggers when you create a GitHub Release.
# Before this works, you must configure Trusted Publishing on PyPI:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new publisher: project=quando-forecast, owner=rodbv, repo=quando, workflow=publish.yml, env=pypi

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
